<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hộp Quà Bí Mật 🎁</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', Arial, sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #ffe1ec, #f8a5c2, #786fa6);
      overflow: hidden;
      color: white;
      text-align: center;
    }

    .container {
      width: min(92vw, 520px);
      padding: 32px 22px;
      border-radius: 30px;
      background: rgba(255, 255, 255, 0.16);
      box-shadow: 0 25px 70px rgba(0, 0, 0, 0.28);
      backdrop-filter: blur(14px);
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: clamp(30px, 7vw, 46px);
      margin-bottom: 12px;
      text-shadow: 0 4px 18px rgba(0, 0, 0, 0.25);
    }

    .subtitle {
      font-size: 17px;
      opacity: 0.94;
      margin-bottom: 28px;
      line-height: 1.5;
    }

    .gift-area {
      height: 230px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }

    .gift-box {
      width: 180px;
      height: 150px;
      position: relative;
      cursor: pointer;
      transform-style: preserve-3d;
      transition: transform 0.25s ease;
      animation: float 2.1s ease-in-out infinite;
    }

    .gift-box:hover {
      transform: scale(1.06) rotate(-2deg);
    }

    .box-body {
      position: absolute;
      bottom: 0;
      width: 180px;
      height: 120px;
      background: linear-gradient(135deg, #ff4757, #ff6b81);
      border-radius: 14px 14px 22px 22px;
      box-shadow: inset -10px -12px 0 rgba(0, 0, 0, 0.08), 0 18px 35px rgba(0, 0, 0, 0.28);
    }

    .box-lid {
      position: absolute;
      top: 0;
      left: -10px;
      width: 200px;
      height: 48px;
      background: linear-gradient(135deg, #ff6b81, #ff4757);
      border-radius: 14px;
      z-index: 4;
      transition: transform 0.7s ease, opacity 0.7s ease;
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.22);
    }

    .ribbon-v {
      position: absolute;
      left: 74px;
      bottom: 0;
      width: 32px;
      height: 150px;
      background: linear-gradient(#ffd32a, #ffb142);
      z-index: 5;
      border-radius: 8px;
    }

    .ribbon-h {
      position: absolute;
      left: 0;
      bottom: 48px;
      width: 180px;
      height: 30px;
      background: linear-gradient(90deg, #ffd32a, #ffb142);
      z-index: 5;
    }

    .bow {
      position: absolute;
      top: -38px;
      left: 48px;
      width: 84px;
      height: 54px;
      z-index: 6;
    }

    .bow::before,
    .bow::after {
      content: "";
      position: absolute;
      width: 48px;
      height: 48px;
      border: 13px solid #ffd32a;
      border-radius: 50% 50% 12px 50%;
      background: transparent;
    }

    .bow::before {
      left: 0;
      transform: rotate(35deg);
    }

    .bow::after {
      right: 0;
      transform: rotate(135deg);
    }

    .gift-box.opened {
      animation: none;
    }

    .gift-box.opened .box-lid {
      transform: translateY(-100px) rotate(-18deg);
      opacity: 0;
    }

    .gift-box.opened .bow {
      transform: translateY(-120px) scale(0.7) rotate(25deg);
      opacity: 0;
      transition: 0.7s ease;
    }

    .gift-box.shake {
      animation: shake 0.45s ease-in-out 3;
    }

    .result {
      min-height: 92px;
      padding: 18px;
      border-radius: 22px;
      background: rgba(255, 255, 255, 0.18);
      border: 1px solid rgba(255, 255, 255, 0.24);
      display: none;
      animation: pop 0.55s ease forwards;
    }

    .result.show {
      display: block;
    }

    .result .label {
      font-size: 16px;
      opacity: 0.9;
      margin-bottom: 8px;
    }

    .result .gift-name {
      font-size: clamp(25px, 6vw, 36px);
      font-weight: 800;
    }

    button {
      border: none;
      padding: 14px 24px;
      margin-top: 20px;
      border-radius: 999px;
      font-size: 17px;
      font-weight: 700;
      color: #6d214f;
      background: linear-gradient(135deg, #fff, #ffeaa7);
      cursor: pointer;
      box-shadow: 0 12px 28px rgba(0, 0, 0, 0.2);
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
    }

    .note {
      margin-top: 14px;
      font-size: 13px;
      opacity: 0.8;
    }

    .confetti {
      position: fixed;
      top: -14px;
      width: 10px;
      height: 16px;
      border-radius: 3px;
      animation: fall linear forwards;
      z-index: 1;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    @keyframes shake {
      0%, 100% { transform: rotate(0deg); }
      20% { transform: rotate(-8deg); }
      40% { transform: rotate(8deg); }
      60% { transform: rotate(-6deg); }
      80% { transform: rotate(6deg); }
    }

    @keyframes pop {
      from { opacity: 0; transform: scale(0.72) translateY(18px); }
      to { opacity: 1; transform: scale(1) translateY(0); }
    }

    @keyframes fall {
      to {
        transform: translateY(110vh) rotate(720deg);
        opacity: 0.9;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Hộp Quà Bí Mật 🎁</h1>
    <p class="subtitle">Bấm vào hộp quà để mở bất ngờ. Không ai biết bên trong có gì đâu nha 😆</p>

    <div class="gift-area">
      <div class="gift-box" id="giftBox" onclick="openGift()">
        <div class="bow"></div>
        <div class="box-lid"></div>
        <div class="box-body"></div>
        <div class="ribbon-v"></div>
        <div class="ribbon-h"></div>
      </div>
    </div>

    <div class="result" id="result">
      <div class="label">Bạn đã mở được:</div>
      <div class="gift-name" id="giftName"></div>
    </div>

    <button onclick="resetGift()">Mở lại lần nữa</button>
    <div class="note">Bạn có thể đổi danh sách quà trong phần JavaScript.</div>
  </div>

  <script>
    const gifts = [
      { name: "100.000đ tiền mặt 💸", chance: 1 },
      { name: "50.000đ may mắn ✨", chance: 4 },
      { name: "Một ly trà sữa 🧋", chance: 12 },
      { name: "Một bữa ăn miễn phí 🍜", chance: 8 },
      { name: "Một cái ôm miễn phí 🤗", chance: 18 },
      { name: "Một lời chúc siêu dễ thương 💖", chance: 22 },
      { name: "Chúc may mắn lần sau 😭", chance: 35 }
    ];

    let opened = false;

    function pickGift() {
      const total = gifts.reduce((sum, gift) => sum + gift.chance, 0);
      let random = Math.random() * total;

      for (const gift of gifts) {
        random -= gift.chance;
        if (random <= 0) return gift.name;
      }
      return gifts[gifts.length - 1].name;
    }

    function openGift() {
      if (opened) return;
      opened = true;

      const box = document.getElementById("giftBox");
      const result = document.getElementById("result");
      const giftName = document.getElementById("giftName");

      box.classList.add("shake");
      result.classList.remove("show");

      setTimeout(() => {
        box.classList.remove("shake");
        box.classList.add("opened");
        giftName.textContent = pickGift();
        result.classList.add("show");
        makeConfetti();
      }, 1400);
    }

    function resetGift() {
      opened = false;
      document.getElementById("giftBox").classList.remove("opened", "shake");
      document.getElementById("result").classList.remove("show");
      document.getElementById("giftName").textContent = "";
    }

    function makeConfetti() {
      const colors = ["#ff4757", "#ffa502", "#2ed573", "#1e90ff", "#eccc68", "#ff6b81", "#ffffff"];

      for (let i = 0; i < 90; i++) {
        const confetti = document.createElement("div");
        confetti.className = "confetti";
        confetti.style.left = Math.random() * 100 + "vw";
        confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
        confetti.style.animationDuration = 2 + Math.random() * 2.5 + "s";
        confetti.style.animationDelay = Math.random() * 0.35 + "s";
        document.body.appendChild(confetti);

        setTimeout(() => confetti.remove(), 5000);
      }
    }
  </script>
</body>
</html>
